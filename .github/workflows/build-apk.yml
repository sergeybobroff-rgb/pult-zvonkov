name: Собрать APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Сборка Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Установить зависимости npm
        run: npm install

      - name: Добавить платформу Android
        run: npx cap add android

      - name: Синхронизировать файлы в WebView
        run: npx cap sync android

      # ── PATCH 1: Разрешения в AndroidManifest.xml ──────────────────
      - name: Добавить разрешение на микрофон в AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Добавляем RECORD_AUDIO перед тегом <application
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <application|' "$MANIFEST"
          echo "✓ AndroidManifest.xml:"
          grep -n "permission" "$MANIFEST"

      # ── PATCH 2: MainActivity.java — запрашиваем разрешение при старте ─
      - name: Заменить MainActivity.java
        run: |
          # Найти пакет из capacitor.config.json
          PKG=$(node -e "console.log(require('./capacitor.config.json').appId)")
          PKG_PATH=$(echo $PKG | tr '.' '/')
          MAIN_FILE="android/app/src/main/java/${PKG_PATH}/MainActivity.java"
          
          echo "Патчим: $MAIN_FILE"
          
          cat > "$MAIN_FILE" << JAVA
          package ${PKG};
          
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
              private static final int MIC_PERMISSION_CODE = 101;
          
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // Запрашиваем разрешение на микрофон при старте
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                              new String[]{Manifest.permission.RECORD_AUDIO},
                              MIC_PERMISSION_CODE);
                  }
              }
          
              @Override
              public void onRequestPermissionsResult(int requestCode,
                      String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  // После ответа пользователя — перезапустить мониторинг через JS
                  if (requestCode == MIC_PERMISSION_CODE) {
                      if (grantResults.length > 0
                              && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          getBridge().getWebView().post(() ->
                              getBridge().getWebView().evaluateJavascript(
                                  "if(typeof startMon === 'function') startMon();", null));
                      }
                  }
              }
          }
          JAVA
          
          echo "✓ MainActivity.java обновлён"
          cat "$MAIN_FILE"

      # ── PATCH 3: WebChromeClient — разрешаем WebRTC в WebView ───────
      - name: Патч BridgeActivity для WebRTC permissions
        run: |
          PKG=$(node -e "console.log(require('./capacitor.config.json').appId)")
          PKG_PATH=$(echo $PKG | tr '.' '/')
          
          # Создаём кастомный WebChromeClient в том же пакете
          CHROME_FILE="android/app/src/main/java/${PKG_PATH}/MicWebChromeClient.java"
          
          cat > "$CHROME_FILE" << JAVA
          package ${PKG};
          
          import android.webkit.PermissionRequest;
          import com.getcapacitor.BridgeWebChromeClient;
          import com.getcapacitor.Bridge;
          
          /**
           * Расширяем BridgeWebChromeClient чтобы разрешать WebRTC (getUserMedia)
           */
          public class MicWebChromeClient extends BridgeWebChromeClient {
              public MicWebChromeClient(Bridge bridge) {
                  super(bridge);
              }
          
              @Override
              public void onPermissionRequest(PermissionRequest request) {
                  // Автоматически разрешаем запросы на микрофон из WebView
                  // (Android-разрешение RECORD_AUDIO уже запрошено в MainActivity)
                  request.grant(request.getResources());
              }
          }
          JAVA
          
          echo "✓ MicWebChromeClient.java создан"

      # ── PATCH 4: Подключить кастомный ChromeClient в MainActivity ───
      - name: Подключить MicWebChromeClient
        run: |
          PKG=$(node -e "console.log(require('./capacitor.config.json').appId)")
          PKG_PATH=$(echo $PKG | tr '.' '/')
          MAIN_FILE="android/app/src/main/java/${PKG_PATH}/MainActivity.java"
          
          cat > "$MAIN_FILE" << JAVA
          package ${PKG};
          
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
              private static final int MIC_CODE = 101;
          
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  // Регистрируем кастомный ChromeClient ДО вызова super
                  registerPlugin(null); // placeholder
                  super.onCreate(savedInstanceState);
          
                  // Устанавливаем наш WebChromeClient который разрешает getUserMedia
                  getBridge().getWebView().setWebChromeClient(
                      new MicWebChromeClient(getBridge()));
          
                  // Запрашиваем Android-разрешение RECORD_AUDIO
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.RECORD_AUDIO}, MIC_CODE);
                  }
              }
          
              @Override
              public void onRequestPermissionsResult(int code,
                      String[] perms, int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code == MIC_CODE && results.length > 0
                          && results[0] == PackageManager.PERMISSION_GRANTED) {
                      // Разрешение получено — запускаем мониторинг
                      getBridge().getWebView().post(() ->
                          getBridge().getWebView().evaluateJavascript(
                              "if(typeof retryMic==='function')retryMic();", null));
                  }
              }
          }
          JAVA
          echo "✓ MainActivity.java финальная версия готова"

      - name: Сделать gradlew исполняемым
        run: chmod +x android/gradlew

      - name: Собрать APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Загрузить APK
        uses: actions/upload-artifact@v4
        with:
          name: Пульт_звонков_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Итог
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "✓ APK собран: $(du -sh $APK | cut -f1)"
